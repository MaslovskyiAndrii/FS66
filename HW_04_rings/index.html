<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olympic rings</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page">
    <h1>Olympic rings</h1>

    <section class="rings" aria-label="Пять разноцветных олимпийских колец ">
      <div class="row row-top">
        <div class="ring ring-blue"></div>
        <div class="ring ring-black"></div>
        <div class="ring ring-red"></div>
      </div>

      <div class="row row-bottom">
        <div class="ring ring-yellow"></div>
        <div class="ring ring-green"></div>
      </div>
    </section>
  </main>
</body>
</html>
